name: Deploy to Staging

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: staging-deploy
  cancel-in-progress: false  # Never cancel in-flight staging deploys

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: playoffe/workers
  ECS_CLUSTER: playoffe-staging-workers
  ECS_SERVICE: playoffe-staging-workers
  ECS_TASK_FAMILY: playoffe-staging-workers

jobs:
  # ── 1. Run migrations on Supabase staging ────────────────────────────────────
  migrate:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.STAGING_SUPABASE_PROJECT_REF }}
          supabase db push --linked
          echo "✓ Migrations applied to staging"

  # ── 2. Build Docker image and push to ECR ────────────────────────────────────
  build-and-push:
    name: Build & Push Workers Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          TAG="staging-${{ github.sha }}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          URI="$REGISTRY/${{ env.ECR_REPOSITORY }}:$TAG"
          echo "tag=$TAG"   >> $GITHUB_OUTPUT
          echo "uri=$URI"   >> $GITHUB_OUTPUT
          echo "Image: $URI"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workers/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.uri }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:staging-latest
          cache-to: type=inline

  # ── 3. Deploy new image to ECS staging ───────────────────────────────────────
  deploy-ecs:
    name: ECS Rolling Deploy (Staging)
    runs-on: ubuntu-latest
    needs: [migrate, build-and-push]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: workers
          image: ${{ needs.build-and-push.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:          ${{ env.ECS_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── 4. Deploy frontend to Vercel staging ─────────────────────────────────────
  deploy-vercel:
    name: Vercel Staging Deploy
    runs-on: ubuntu-latest
    needs: [migrate]  # DB must be migrated before frontend goes live
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to staging
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ── 5. Post deployment summary ────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-ecs, deploy-vercel]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "## Staging Deployment"
          echo "Commit:    ${{ github.sha }}"
          echo "Image tag: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "ECS:       ${{ needs.deploy-ecs.result }}"
          echo "Vercel:    ${{ needs.deploy-vercel.result }}"
