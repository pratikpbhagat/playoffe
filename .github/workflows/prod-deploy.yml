name: Deploy to Production

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # e.g. v1.0.0, v1.2.3

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: playoffe/workers
  ECS_CLUSTER: playoffe-prod-workers
  ECS_SERVICE: playoffe-prod-workers
  ECS_TASK_FAMILY: playoffe-prod-workers

# ── Manual approval gate ───────────────────────────────────────────────────────
# Go to GitHub → Settings → Environments → "production"
# Add yourself as a required reviewer.
# The deploy job below won't run until you approve it.

jobs:
  # ── 1. Run migrations on Supabase prod ───────────────────────────────────────
  migrate:
    name: Supabase Migrations (Prod)
    runs-on: ubuntu-latest
    environment: production  # ← triggers approval gate
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --project-ref ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
          echo "✓ Migrations applied to production"

  # ── 2. Promote staging image to prod (no rebuild) ────────────────────────────
  promote-image:
    name: Promote ECR Image to Prod
    runs-on: ubuntu-latest
    needs: [migrate]
    outputs:
      image_uri: ${{ steps.promote.outputs.image_uri }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote staging image to prod tag
        id: promote
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ github.ref_name }}  # e.g. v1.0.0
        run: |
          # Pull the staging-latest image (built from master, same SHA being tagged)
          docker pull $REGISTRY/$ECR_REPOSITORY:staging-latest

          # Retag as prod-<version> and prod-latest
          docker tag $REGISTRY/$ECR_REPOSITORY:staging-latest $REGISTRY/$ECR_REPOSITORY:prod-$TAG
          docker tag $REGISTRY/$ECR_REPOSITORY:staging-latest $REGISTRY/$ECR_REPOSITORY:prod-latest

          docker push $REGISTRY/$ECR_REPOSITORY:prod-$TAG
          docker push $REGISTRY/$ECR_REPOSITORY:prod-latest

          URI="$REGISTRY/$ECR_REPOSITORY:prod-$TAG"
          echo "image_uri=$URI" >> $GITHUB_OUTPUT
          echo "Promoted: $URI"

  # ── 3. Rolling deploy to ECS prod ────────────────────────────────────────────
  deploy-ecs:
    name: ECS Rolling Deploy (Prod)
    runs-on: ubuntu-latest
    needs: [promote-image]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: workers
          image: ${{ needs.promote-image.outputs.image_uri }}

      - name: Deploy to production ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service:          ${{ env.ECS_SERVICE }}
          cluster:          ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── 4. Deploy frontend to Vercel production ───────────────────────────────────
  deploy-vercel:
    name: Vercel Production Deploy
    runs-on: ubuntu-latest
    needs: [migrate]
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

  # ── 5. Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy-ecs, deploy-vercel]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges | head -20)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS"       >> $GITHUB_OUTPUT
          echo "EOF"            >> $GITHUB_OUTPUT

      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name: '${{ github.ref_name }}',
              name: 'PLAYOFFE ${{ github.ref_name }}',
              body: `## Changes\n\n\`\`\`\n${{ steps.changelog.outputs.changelog }}\n\`\`\``,
              draft: false,
              prerelease: false,
            })
